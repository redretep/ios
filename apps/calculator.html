    <title>iOS Calculator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        iosGrayLight: '#a5a5a5',
                        iosGrayLightHover: '#d9d9d9',
                        iosGrayDark: '#333333',
                        iosGrayDarkHover: '#4a4a4a',
                        iosOrange: '#ff9f0a',
                        iosOrangeHover: '#f1a33a',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }

    <style>
        /* Standalone iOS web-app settings & scroll preventions */
        body {
            background-color: #000000;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Responsive layout orientation handling */
        @media (orientation: portrait) {
            .portrait-only { display: grid !important; }
            .landscape-only { display: none !important; }
            .calculator-container { max-width: 420px; }
        }
        @media (orientation: landscape) {
            .portrait-only { display: none !important; }
            .landscape-only { display: grid !important; }
            .calculator-container { max-width: 850px; }
        }

        /* iOS tap animations */
        .btn-active-gray-light:active {
            background-color: #d9d9d9 !important;
        }
        .btn-active-gray-dark:active {
            background-color: #555555 !important;
        }
        .btn-active-orange:active {
            background-color: #f1a33a !important;
        }
        
        /* Operator active high-fidelity flash */
        .operator-selected {
            background-color: #ffffff !important;
            color: #ff9f0a !important;
        }
    </style>

    <!-- CALCULATOR APPLICATION CONTROLLER CODE -->
    <script>
        // --- BASIC APPLICATION STATE ---
        let display = '0';
        let prevValue = null;
        let operator = null;
        let isWaitingForOperand = false;
        let activeOperator = null;
        let memory = 0;
        let isRad = false;
        let is2nd = false;
        let parenthesesStack = [];

        // Audio Click Synth
        let soundEnabled = true;

        // Swipe Delete Helpers
        let touchStartX = 0;

        // --- CLICK AUDIO tick SYNTHESIS ---
        function playClickSound() {
            if (!soundEnabled) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1400, ctx.currentTime);
                
                gain.gain.setValueAtTime(0.04, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.04);
            } catch (e) {
                // Silently fallback on browser autoplays policy block
            }
        }

        // --- MATH CALCULATOR ENGINE ---
        function calculate(a, b, op) {
            const numA = parseFloat(a);
            const numB = parseFloat(b);
            if (isNaN(numA) || isNaN(numB)) return 'Error';

            let result = 0;
            switch (op) {
                case '+': result = numA + numB; break;
                case '-': result = numA - numB; break;
                case '×': result = numA * numB; break;
                case '÷': 
                    if (numB === 0) return 'Error';
                    result = numA / numB; 
                    break;
                case 'x^y': result = Math.pow(numA, numB); break;
                case 'y√x': 
                    if (numA < 0 && numB % 2 === 0) return 'Error';
                    result = Math.pow(numA, 1 / numB); 
                    break;
                default: return b;
            }

            if (isNaN(result)) return 'NaN';
            if (!isFinite(result)) return 'Infinity';

            // High Precision limit handling
            const maxPrecision = window.innerWidth > window.innerHeight ? 14 : 10;
            const precisionResult = parseFloat(result.toPrecision(maxPrecision));

            // Auto conversion to Scientific notation
            const absRes = Math.abs(precisionResult);
            if (absRes !== 0 && (absRes >= 1e9 || absRes < 1e-7)) {
                return precisionResult.toExponential(5);
            }

            return precisionResult.toString();
        }

        // --- KEY ACTIONS HANDLERS ---
        function handleDigit(digit) {
            playClickSound();
            clearOperatorHighlights();

            if (display === 'Error' || display === 'NaN' || display === 'Infinity') {
                display = digit;
                isWaitingForOperand = false;
                updateDisplay();
                return;
            }

            if (isWaitingForOperand) {
                display = digit;
                isWaitingForOperand = false;
                activeOperator = null;
            } else {
                const maxDigits = window.innerWidth > window.innerHeight ? 16 : 9;
                const currentDigits = display.replace(/[.-]/g, '').length;
                if (currentDigits >= maxDigits) return;

                if (display === '0') {
                    display = digit;
                } else {
                    display += digit;
                }
            }
            updateDisplay();
        }

        function handleDecimal() {
            playClickSound();
            clearOperatorHighlights();

            if (isWaitingForOperand) {
                display = '0.';
                isWaitingForOperand = false;
                activeOperator = null;
                updateDisplay();
                return;
            }

            if (!display.includes('.')) {
                display += '.';
            }
            updateDisplay();
        }

        function handleOperator(nextOperator) {
            playClickSound();
            
            if (operator && isWaitingForOperand) {
                operator = nextOperator;
                activeOperator = nextOperator;
                highlightActiveOperator();
                return;
            }

            if (prevValue === null) {
                prevValue = display;
            } else if (operator) {
                const result = calculate(prevValue, display, operator);
                display = result;
                prevValue = result;
            }

            isWaitingForOperand = true;
            operator = nextOperator;
            activeOperator = nextOperator;
            highlightActiveOperator();
            updateDisplay();
        }

        // --- EVALUATE ---
        function handleEqual() {
            playClickSound();
            clearOperatorHighlights();
            if (!operator || prevValue === null) return;

            const result = calculate(prevValue, display, operator);
            display = result;
            prevValue = null;
            operator = null;
            activeOperator = null;
            isWaitingForOperand = true;
            updateDisplay();
        }

        // --- CLEAR ---
        function handleClear() {
            playClickSound();
            clearOperatorHighlights();
            const isClearAll = display === '0' || isWaitingForOperand;
            
            if (isClearAll) {
                display = '0';
                prevValue = null;
                operator = null;
                activeOperator = null;
                isWaitingForOperand = false;
                parenthesesStack = [];
            } else {
                display = '0';
            }
            updateDisplay();
        }

        function handleToggleSign() {
            playClickSound();
            if (display === '0') return;
            if (display.startsWith('-')) {
                display = display.slice(1);
            } else {
                display = '-' + display;
            }
            updateDisplay();
        }

        function handlePercentage() {
            playClickSound();
            const val = parseFloat(display);
            if (isNaN(val)) return;

            if (prevValue !== null && (operator === '+' || operator === '-')) {
                const pctVal = (parseFloat(prevValue) * val) / 100;
                display = pctVal.toString();
            } else {
                display = (val / 100).toString();
            }
            updateDisplay();
        }

        function handleBackspace() {
            if (isWaitingForOperand) return;
            if (display === 'Error' || display === 'NaN' || display === 'Infinity') {
                display = '0';
                updateDisplay();
                return;
            }
            if (display.length <= 1 || (display.length === 2 && display.startsWith('-'))) {
                display = '0';
            } else {
                display = display.slice(0, -1);
            }
            playClickSound();
            updateDisplay();
        }

        // --- PARENTHESES CONTROLLER ---
        function handleOpenParenthesis() {
            playClickSound();
            parenthesesStack.push({ prevValue, operator });
            prevValue = null;
            operator = null;
            display = '0';
            isWaitingForOperand = false;
            updateDisplay();
        }

        function handleCloseParenthesis() {
            playClickSound();
            if (parenthesesStack.length === 0) return;

            let currentResult = display;
            if (operator && prevValue !== null) {
                currentResult = calculate(prevValue, display, operator);
            }

            const outerContext = parenthesesStack.pop();
            if (outerContext.operator) {
                const finalResult = calculate(outerContext.prevValue, currentResult, outerContext.operator);
                display = finalResult;
                prevValue = outerContext.prevValue;
                operator = outerContext.operator;
            } else {
                display = currentResult;
                prevValue = null;
                operator = null;
            }
            isWaitingForOperand = true;
            updateDisplay();
        }

        // --- MEMORY CONTROLLER ---
        function handleMemory(type) {
            playClickSound();
            const val = parseFloat(display);
            if (isNaN(val)) return;

            switch (type) {
                case 'mc': memory = 0; break;
                case 'm+': memory += val; isWaitingForOperand = true; break;
                case 'm-': memory -= val; isWaitingForOperand = true; break;
                case 'mr': display = memory.toString(); isWaitingForOperand = true; break;
            }
            updateDisplay();
        }

        // --- TRIG ENGINE (DEG vs RAD supported) ---
        function handleTrig(func) {
            playClickSound();
            let val = parseFloat(display);
            if (isNaN(val)) return;

            const toRad = (v) => !isRad ? (v * Math.PI) / 180 : v;
            const fromRad = (v) => !isRad ? (v * 180) / Math.PI : v;

            let result = 0;
            if (!is2nd) {
                switch (func) {
                    case 'sin': result = Math.sin(toRad(val)); break;
                    case 'cos': result = Math.cos(toRad(val)); break;
                    case 'tan': result = Math.tan(toRad(val)); break;
                    case 'sinh': result = Math.sinh(val); break;
                    case 'cosh': result = Math.cosh(val); break;
                    case 'tanh': result = Math.tanh(val); break;
                }
            } else {
                switch (func) {
                    case 'sin': result = fromRad(Math.asin(val)); break;
                    case 'cos': result = fromRad(Math.acos(val)); break;
                    case 'tan': result = fromRad(Math.atan(val)); break;
                    case 'sinh': result = Math.asinh(val); break;
                    case 'cosh': result = Math.acosh(val); break;
                    case 'tanh': result = Math.atanh(val); break;
                }
            }

            if (isNaN(result) || !isFinite(result)) {
                display = 'Error';
            } else {
                display = parseFloat(result.toFixed(10)).toString();
            }
            isWaitingForOperand = true;
            updateDisplay();
        }

        // --- ADVANCED SCIENTIFIC CALCULATIONS ---
        function handleScientific(func) {
            playClickSound();
            let val = parseFloat(display);
            if (isNaN(val)) return;

            let result = 0;
            switch (func) {
                case 'x²': result = Math.pow(val, 2); break;
                case 'x³': result = Math.pow(val, 3); break;
                case 'eˣ': result = is2nd ? Math.pow(2, val) : Math.exp(val); break;
                case '10ˣ': result = is2nd ? Math.pow(Math.E, val) : Math.pow(10, val); break;
                case '1/x': result = 1 / val; break;
                case '²√x': result = Math.sqrt(val); break;
                case '³√x': result = Math.cbrt(val); break;
                case 'ln': result = is2nd ? Math.log2(val) : Math.log(val); break;
                case 'log₁₀': result = is2nd ? Math.log(val) / Math.log(2) : Math.log10(val); break;
                case 'π': result = Math.PI; break;
                case 'e': result = Math.E; break;
                case 'Rand': result = Math.random(); break;
            }

            if (isNaN(result) || !isFinite(result)) {
                display = 'Error';
            } else {
                display = parseFloat(result.toFixed(10)).toString();
            }
            isWaitingForOperand = true;
            updateDisplay();
        }

        function handleEE() {
            playClickSound();
            if (!display.includes('e')) {
                display += 'e+';
            }
            updateDisplay();
        }

        function toggleRad() {
            playClickSound();
            isRad = !isRad;
            const btn = document.getElementById('btn-rad-toggle');
            if (isRad) {
                btn.classList.add('bg-white', 'text-black');
                btn.classList.remove('bg-iosGrayDark', 'text-white');
            } else {
                btn.classList.remove('bg-white', 'text-black');
                btn.classList.add('bg-iosGrayDark', 'text-white');
            }
            updateDisplay();
        }

        function toggle2nd() {
            playClickSound();
            is2nd = !is2nd;
            const btn = document.getElementById('btn-2nd');
            if (is2nd) {
                btn.classList.add('bg-white', 'text-black');
                btn.classList.remove('bg-iosGrayDark', 'text-white');
                document.getElementById('btn-ex').innerText = '2ˣ';
                document.getElementById('btn-10x').innerText = 'eˣ';
                document.getElementById('btn-ln').innerText = 'log₂';
                document.getElementById('btn-log').innerText = 'log_y';
                document.getElementById('btn-sin').innerText = 'asin';
                document.getElementById('btn-cos').innerText = 'acos';
                document.getElementById('btn-tan').innerText = 'atan';
                document.getElementById('btn-sinh').innerText = 'asinh';
                document.getElementById('btn-cosh').innerText = 'acosh';
                document.getElementById('btn-tanh').innerText = 'atanh';
            } else {
                btn.classList.remove('bg-white', 'text-black');
                btn.classList.add('bg-iosGrayDark', 'text-white');
                document.getElementById('btn-ex').innerText = 'eˣ';
                document.getElementById('btn-10x').innerText = '10ˣ';
                document.getElementById('btn-ln').innerText = 'ln';
                document.getElementById('btn-log').innerText = 'log₁₀';
                document.getElementById('btn-sin').innerText = 'sin';
                document.getElementById('btn-cos').innerText = 'cos';
                document.getElementById('btn-tan').innerText = 'tan';
                document.getElementById('btn-sinh').innerText = 'sinh';
                document.getElementById('btn-cosh').innerText = 'cosh';
                document.getElementById('btn-tanh').innerText = 'tanh';
            }
        }

        function dummySync() {
            playClickSound();
            // Display helpful rotation notice
            const indicator = document.getElementById('equation-indicator');
            indicator.innerText = "To switch modes, rotate your device/window.";
            setTimeout(() => { indicator.innerText = ""; }, 3000);
        }

        // --- HIGH FIDELITY OUTPUT AND FONT SCALER ---
        function formatValue(val) {
            if (val === 'Error' || val === 'NaN' || val === 'Infinity' || val === '-Infinity') return val;
            if (val.includes('e')) {
                const [base, exp] = val.split('e');
                return `${parseFloat(base).toFixed(4)}e${exp}`;
            }

            const parts = val.split('.');
            const intPart = parts[0];
            const isNegative = intPart.startsWith('-');
            const cleanInt = isNegative ? intPart.slice(1) : intPart;

            let formattedInt = '';
            if (cleanInt === '') {
                formattedInt = isNegative ? '-' : '';
            } else {
                const parsed = parseInt(cleanInt, 10);
                if (isNaN(parsed)) {
                    formattedInt = cleanInt;
                } else {
                    formattedInt = (isNegative ? '-' : '') + parsed.toLocaleString('en-US');
                }
            }

            if (parts.length > 1) {
                return `${formattedInt}.${parts[1]}`;
            }
            return formattedInt;
        }

        function updateDisplay() {
            const displayEl = document.getElementById('display');
            const formatted = formatValue(display);
            displayEl.innerText = formatted;

            // Update Dynamic font sizing based on length to prevent layout breaks
            const isLandscape = window.innerWidth > window.innerHeight;
            const length = display.length;

            if (isLandscape) {
                if (length > 16) displayEl.style.fontSize = '2.5rem';
                else if (length > 12) displayEl.style.fontSize = '3.5rem';
                else displayEl.style.fontSize = '4rem';
            } else {
                if (length > 8) displayEl.style.fontSize = '3.2rem';
                else if (length > 6) displayEl.style.fontSize = '4.5rem';
                else displayEl.style.fontSize = '6rem';
            }

            // AC vs C toggle matching iOS dynamic state
            const isClearAll = display === '0' || isWaitingForOperand;
            const clearBtn = document.getElementById('btn-clear');
            const clearBtnLs = document.getElementById('btn-clear-ls');
            if (clearBtn) clearBtn.innerText = isClearAll ? 'AC' : 'C';
            if (clearBtnLs) clearBtnLs.innerText = isClearAll ? 'AC' : 'C';

            // Top Status Flag indicator update
            const indicator = document.getElementById('equation-indicator');
            if (parenthesesStack.length > 0) {
                indicator.innerText = `Brackets: ${parenthesesStack.length} Nesting` + (isRad ? "  |  RAD" : "");
            } else if (isRad) {
                indicator.innerText = "RAD";
            } else {
                indicator.innerText = "";
            }
        }

        // --- HIGHLIGHT OPERATORS ON PORTRAIT & LANDSCAPE ---
        function clearOperatorHighlights() {
            const ops = [
                'op-divide', 'op-multiply', 'op-subtract', 'op-add',
                'op-divide-ls', 'op-multiply-ls', 'op-subtract-ls', 'op-add-ls',
                'op-pow', 'op-yroot'
            ];
            ops.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('operator-selected');
            });
        }

        function highlightActiveOperator() {
            clearOperatorHighlights();
            if (!activeOperator) return;

            let targets = [];
            switch (activeOperator) {
                case '÷': targets = ['op-divide', 'op-divide-ls']; break;
                case '×': targets = ['op-multiply', 'op-multiply-ls']; break;
                case '-': targets = ['op-subtract', 'op-subtract-ls']; break;
                case '+': targets = ['op-add', 'op-add-ls']; break;
                case 'x^y': targets = ['op-pow']; break;
                case 'y√x': targets = ['op-yroot']; break;
            }

            targets.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('operator-selected');
            });
        }

        // --- SWIPE GESTURE EVENT DETECTS ---
        const displayContainer = document.getElementById('display-container');
        displayContainer.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });

        displayContainer.addEventListener('touchend', (e) => {
            const distance = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(distance) > 55) {
                handleBackspace();
            }
        }, { passive: true });

        // Touch simulation for desktop testing via mouse swipes
        displayContainer.addEventListener('mousedown', (e) => {
            touchStartX = e.clientX;
        });
        displayContainer.addEventListener('mouseup', (e) => {
            const distance = e.clientX - touchStartX;
            if (Math.abs(distance) > 55) {
                handleBackspace();
            }
        });

        // --- PHYSICAL DESKTOP KEYBOARD MAPPINGS ---
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (/[0-9]/.test(key)) {
                handleDigit(key);
            } else if (key === '.') {
                handleDecimal();
            } else if (key === '+') {
                handleOperator('+');
            } else if (key === '-') {
                handleOperator('-');
            } else if (key === '*' || key === 'x' || key === 'X') {
                handleOperator('×');
            } else if (key === '/') {
                handleOperator('÷');
            } else if (key === '=' || key === 'Enter') {
                e.preventDefault();
                handleEqual();
            } else if (key === 'Backspace') {
                handleBackspace();
            } else if (key === 'Escape') {
                handleClear();
            }
        });

        // Dynamic adjust on viewport resizing trigger
        window.addEventListener('resize', updateDisplay);
        
        // Initial paint
        updateDisplay();
    </script>
</body>
</html>
